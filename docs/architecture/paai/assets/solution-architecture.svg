<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="auto" style="background-color: #FFFFFF; font-family: 'Inter', 'Segoe UI', Arial, sans-serif;">
  <defs>
    <style>
      .title { font-size: 18px; font-weight: bold; fill: #0F172A; }
      .subtitle { font-size: 12px; fill: #475569; }
      .container-title { font-size: 12px; font-weight: bold; fill: #0F172A; }
      .comp-title { font-size: 11px; font-weight: bold; fill: #0F172A; }
      .comp-tech { font-size: 9px; fill: #475569; font-style: italic; }
      .legend-title { font-size: 11px; font-weight: bold; fill: #0F172A; }
      .legend-text { font-size: 9px; fill: #475569; }
      .metadata { font-size: 9px; fill: #64748B; }
    </style>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#0F172A" />
    </marker>
    <!-- Dashed arrow marker -->
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569" />
    </marker>
  </defs>
  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Header -->
  <text x="30" y="45" class="title">PAAI - Solution Architecture (L2)</text>
  <text x="30" y="65" class="subtitle">Objective: Logical boundaries, interfaces, and services mapping without technology implementation details.</text>
  <line x1="30" y1="80" x2="1170" y2="80" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Container: Client / Interaction Layer -->
  <rect x="50" y="110" width="1100" height="110" fill="#FCFCFD" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="5,5" rx="4"/>
  <text x="62" y="128" class="container-title">Client / Interaction Layer</text>

  <!-- Component: Business Operations Portal -->
  <rect x="100" y="140" width="180" height="50" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(118, 165)">
      <circle cx="0" cy="-4" r="4" fill="none" stroke="#0F172A" stroke-width="1.2"/>
      <path d="M -7,8 A 7,7 0 0,1 7,8" fill="none" stroke="#0F172A" stroke-width="1.2"/>
    </g>
  <text x="135" y="163" class="comp-title" text-anchor="start">Business Operations Portal</text>
  <text x="135" y="175" class="comp-tech" text-anchor="start">User Web Interface</text>

  <!-- Component: Mobile Application App -->
  <rect x="320" y="140" width="180" height="50" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(338, 165)">
      <circle cx="0" cy="-4" r="4" fill="none" stroke="#0F172A" stroke-width="1.2"/>
      <path d="M -7,8 A 7,7 0 0,1 7,8" fill="none" stroke="#0F172A" stroke-width="1.2"/>
    </g>
  <text x="355" y="163" class="comp-title" text-anchor="start">Mobile Application App</text>
  <text x="355" y="175" class="comp-tech" text-anchor="start">Executive Client App</text>

  <!-- Component: Third-Party API Consumers -->
  <rect x="540" y="140" width="180" height="50" fill="#FFFFFF" stroke="#6D28D9" stroke-width="1.2" rx="4" ry="4" stroke-dasharray="4,4"/>
  <g transform="translate(558, 165)">
      <path d="M -5,4 A 3,3 0 0,1 -3,-2 A 4,4 0 0,1 3,-2 A 3,3 0 0,1 5,4 Z" fill="none" stroke="#6D28D9" stroke-width="1.2"/>
    </g>
  <text x="575" y="163" class="comp-title" text-anchor="start">Third-Party API Consumers</text>
  <text x="575" y="175" class="comp-tech" text-anchor="start">Webhooks / Integrations</text>

  <!-- Container: Gateway / Authentication Layer -->
  <rect x="50" y="250" width="1100" height="100" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,5" rx="4"/>
  <text x="62" y="268" class="container-title">Gateway / Authentication Layer</text>

  <!-- Component: Enterprise API Gateway Proxy -->
  <rect x="250" y="275" width="300" height="50" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(268, 300)">
      <circle cx="-6" cy="4" r="2" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <circle cx="6" cy="4" r="2" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <circle cx="0" cy="-4" r="2" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <line x1="0" y1="-2" x2="0" y2="4" stroke="#2563EB" stroke-width="1.2"/>
      <line x1="-6" y1="4" x2="6" y2="4" stroke="#2563EB" stroke-width="1.2"/>
    </g>
  <text x="285" y="298" class="comp-title" text-anchor="start">Enterprise API Gateway Proxy</text>
  <text x="285" y="310" class="comp-tech" text-anchor="start">Routes &amp; Ingress Policy</text>

  <!-- Component: Identity Provider / Auth Guard -->
  <rect x="650" y="275" width="300" height="50" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(668, 300)">
      <rect x="-5" y="-1" width="10" height="7" fill="none" stroke="#0D9488" stroke-width="1.2" rx="1"/>
      <path d="M -3,-1 L -3,-4 A 3,3 0 0,1 3,-4 L 3,-1" fill="none" stroke="#0D9488" stroke-width="1.2"/>
    </g>
  <text x="685" y="298" class="comp-title" text-anchor="start">Identity Provider / Auth Guard</text>
  <text x="685" y="310" class="comp-tech" text-anchor="start">Auth &amp; RBAC Access Evaluator</text>

  <!-- Container: Application / Domain Service Layer -->
  <rect x="50" y="380" width="1100" height="200" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5,5" rx="4"/>
  <text x="62" y="398" class="container-title">Application / Domain Service Layer</text>

  <!-- Component: Morning Brief Orchestrator -->
  <rect x="100" y="420" width="240" height="60" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(118, 450)">
      <circle cx="-4" cy="-3" r="1.5" fill="#2563EB"/>
      <circle cx="4" cy="-3" r="1.5" fill="#2563EB"/>
      <circle cx="0" cy="4" r="1.5" fill="#2563EB"/>
      <line x1="-2.5" y1="-3" x2="2.5" y2="-3" stroke="#2563EB" stroke-width="1"/>
      <line x1="-3.5" y1="-1.5" x2="-0.8" y2="2.5" stroke="#2563EB" stroke-width="1"/>
      <line x1="3.5" y1="-1.5" x2="0.8" y2="2.5" stroke="#2563EB" stroke-width="1"/>
    </g>
  <text x="135" y="448" class="comp-title" text-anchor="start">Morning Brief Orchestrator</text>
  <text x="135" y="460" class="comp-tech" text-anchor="start">Logic Synthesis Engine</text>

  <!-- Component: RAG Knowledge Coordinator -->
  <rect x="380" y="420" width="240" height="60" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(398, 450)">
      <path d="M -5,-7 L 2,-7 L 5,-4 L 5,7 L -5,7 Z" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <path d="M 2,-7 L 2,-4 L 5,-4" fill="none" stroke="#2563EB" stroke-width="1.2"/>
    </g>
  <text x="415" y="448" class="comp-title" text-anchor="start">RAG Knowledge Coordinator</text>
  <text x="415" y="460" class="comp-tech" text-anchor="start">Retrieval &amp; Context Synthesizer</text>

  <!-- Component: MCP Adapter Service -->
  <rect x="660" y="420" width="240" height="60" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(678, 450)">
      <circle cx="-6" cy="4" r="2" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <circle cx="6" cy="4" r="2" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <circle cx="0" cy="-4" r="2" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <line x1="0" y1="-2" x2="0" y2="4" stroke="#2563EB" stroke-width="1.2"/>
      <line x1="-6" y1="4" x2="6" y2="4" stroke="#2563EB" stroke-width="1.2"/>
    </g>
  <text x="695" y="448" class="comp-title" text-anchor="start">MCP Adapter Service</text>
  <text x="695" y="460" class="comp-tech" text-anchor="start">Connects external data sets</text>

  <!-- Component: Corporate Data Ingest Engine -->
  <rect x="380" y="510" width="240" height="50" fill="#FFFFFF" stroke="#475569" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(398, 535)">
      <path d="M -5,-7 L 2,-7 L 5,-4 L 5,7 L -5,7 Z" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M 2,-7 L 2,-4 L 5,-4" fill="none" stroke="#475569" stroke-width="1.2"/>
    </g>
  <text x="415" y="533" class="comp-title" text-anchor="start">Corporate Data Ingest Engine</text>
  <text x="415" y="545" class="comp-tech" text-anchor="start">Document Parser Pipeline</text>

  <!-- Container: Data Storage &amp; Ingestion Layer -->
  <rect x="50" y="600" width="1100" height="100" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,5" rx="4"/>
  <text x="62" y="618" class="container-title">Data Storage &amp; Ingestion Layer</text>

  <!-- Component: Relational Database Registry -->
  <rect x="150" y="625" width="220" height="50" fill="#FFFFFF" stroke="#475569" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(168, 650)">
      <path d="M -7,-5 A 7,2 0 0,0 7,-5 L 7,5 A 7,2 0 0,1 -7,5 Z" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M -7,-5 A 7,2 0 0,1 7,-5" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M -7,0 A 7,2 0 0,0 7,0" fill="none" stroke="#475569" stroke-width="1.2"/>
    </g>
  <text x="185" y="648" class="comp-title" text-anchor="start">Relational Database Registry</text>
  <text x="185" y="660" class="comp-tech" text-anchor="start">Configuration &amp; metadata records</text>

  <!-- Component: Indexed Vector Store -->
  <rect x="480" y="625" width="220" height="50" fill="#FFFFFF" stroke="#475569" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(498, 650)">
      <path d="M -7,-5 A 7,2 0 0,0 7,-5 L 7,5 A 7,2 0 0,1 -7,5 Z" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M -7,-5 A 7,2 0 0,1 7,-5" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M -7,0 A 7,2 0 0,0 7,0" fill="none" stroke="#475569" stroke-width="1.2"/>
    </g>
  <text x="515" y="648" class="comp-title" text-anchor="start">Indexed Vector Store</text>
  <text x="515" y="660" class="comp-tech" text-anchor="start">Chunked knowledge mappings</text>

  <!-- Component: Ecosystem Graph Database -->
  <rect x="810" y="625" width="220" height="50" fill="#FFFFFF" stroke="#475569" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(828, 650)">
      <path d="M -7,-5 A 7,2 0 0,0 7,-5 L 7,5 A 7,2 0 0,1 -7,5 Z" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M -7,-5 A 7,2 0 0,1 7,-5" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M -7,0 A 7,2 0 0,0 7,0" fill="none" stroke="#475569" stroke-width="1.2"/>
    </g>
  <text x="845" y="648" class="comp-title" text-anchor="start">Ecosystem Graph Database</text>
  <text x="845" y="660" class="comp-tech" text-anchor="start">Relationship schema model</text>
  <line x1="190" y1="190" x2="280" y2="275" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
    <line x1="410" y1="190" x2="410" y2="275" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
    <line x1="630" y1="190" x2="520" y2="275" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
    <line x1="550" y1="300" x2="650" y2="300" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
  <text x="600" y="295" class="metadata" text-anchor="middle">Secures API</text>  <line x1="410" y1="325" x2="500" y2="420" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
    <line x1="220" y1="480" x2="220" y2="625" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-dash)" stroke="#475569"/>
    <line x1="500" y1="560" x2="500" y2="625" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
    <line x1="780" y1="480" x2="890" y2="625" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
  
  <!-- Standard Legend Block -->
  <g transform="translate(880, 450)">
    <rect width="260" height="120" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" rx="4"/>
    <text x="15" y="25" class="legend-title">YnY Architecture Registry Legend</text>
    <text x="15" y="45" class="legend-text">Product: PAAI</text>
    <text x="15" y="60" class="legend-text">View: Logical Solution (L2)</text>
    <text x="15" y="75" class="legend-text">Version: 1.0.0 (Approved)</text>
    <text x="15" y="90" class="legend-text">Standard: STD-017 (Flat Corporate)</text>
    <text x="15" y="105" class="legend-text">Last Updated: 2026-06-29</text>
    
    <!-- Connector examples inside legend -->
    <line x1="170" y1="45" x2="200" y2="45" stroke="#0F172A" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="210" y="48" class="metadata">Sync (REST/gRPC)</text>
    
    <line x1="170" y1="65" x2="200" y2="65" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-dash)"/>
    <text x="210" y="68" class="metadata">Async / Event</text>
    
    <rect x="170" y="82" width="12" height="12" fill="#FFFFFF" stroke="#0D9488" stroke-width="1" rx="2"/>
    <text x="190" y="91" class="metadata">Security Scope</text>
    
    <rect x="170" y="98" width="12" height="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="1" rx="2"/>
    <text x="190" y="107" class="metadata">API Gateway</text>
  </g>
</svg>