  <rect x="500" y="480" width="320" height="60" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(518, 510)">
      <rect x="-5" y="-1" width="10" height="7" fill="none" stroke="#0F172A" stroke-width="1.2" rx="1"/>
      <path d="M -3,-1 L -3,-4 A 3,3 0 0,1 3,-4 L 3,-1" fill="none" stroke="#0F172A" stroke-width="1.2"/>
    </g>
  <text x="535" y="508" class="comp-title" text-anchor="start">Go Payment / Token Ledger write</text>
  <text x="535" y="520" class="comp-tech" text-anchor="start">Go 1.22 transaction logging micro</text>

  <!-- Component: Apache Kafka Message Router -->
  <rect x="900" y="480" width="320" height="60" fill="#FFF" stroke="#475569" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(918, 510)">
      <circle cx="-6" cy="4" r="2" fill="none" stroke="#475569" stroke-width="1.2"/>
      <circle cx="6" cy="4" r="2" fill="none" stroke="#475569" stroke-width="1.2"/>
      <circle cx="0" cy="-4" r="2" fill="none" stroke="#475569" stroke-width="1.2"/>
      <line x1="0" y1="-2" x2="0" y2="4" stroke="#475569" stroke-width="1.2"/>
      <line x1="-6" y1="4" x2="6" y2="4" stroke="#475569" stroke-width="1.2"/>
    </g>
  <text x="935" y="508" class="comp-title" text-anchor="start">Apache Kafka Message Router</text>
  <text x="935" y="520" class="comp-tech" text-anchor="start">Microservice event dispatcher bus</text>

  <!-- Component: Stripe Payment Proxy Service -->
  <rect x="500" y="570" width="320" height="50" fill="#FFFFFF" stroke="#475569" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(518, 595)">
      <rect x="-5" y="-1" width="10" height="7" fill="none" stroke="#475569" stroke-width="1.2" rx="1"/>
      <path d="M -3,-1 L -3,-4 A 3,3 0 0,1 3,-4 L 3,-1" fill="none" stroke="#475569" stroke-width="1.2"/>
    </g>
  <text x="535" y="593" class="comp-title" text-anchor="start">Stripe Payment Proxy Service</text>
  <text x="535" y="605" class="comp-tech" text-anchor="start">Secure external gateway API proxy</text>

  <!-- Container: VPC Isolated Database &amp; Storage Subnet -->
  <rect x="60" y="660" width="1280" height="140" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,5" rx="4"/>
  <text x="72" y="678" class="container-title">VPC Isolated Database &amp; Storage Subnet</text>

  <!-- Component: AWS Aurora PostgreSQL cluster -->
  <rect x="100" y="700" width="320" height="60" fill="#FFFFFF" stroke="#475569" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(118, 730)">
      <path d="M -7,-5 A 7,2 0 0,0 7,-5 L 7,5 A 7,2 0 0,1 -7,5 Z" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M -7,-5 A 7,2 0 0,1 7,-5" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M -7,0 A 7,2 0 0,0 7,0" fill="none" stroke="#475569" stroke-width="1.2"/>
    </g>
  <text x="135" y="728" class="comp-title" text-anchor="start">AWS Aurora PostgreSQL cluster</text>
  <text x="135" y="740" class="comp-tech" text-anchor="start">User databases, session records</text>

  <!-- Component: Redis distributed session store -->
  <rect x="500" y="700" width="320" height="60" fill="#FFFFFF" stroke="#475569" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(518, 730)">
      <path d="M -7,-5 A 7,2 0 0,0 7,-5 L 7,5 A 7,2 0 0,1 -7,5 Z" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M -7,-5 A 7,2 0 0,1 7,-5" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M -7,0 A 7,2 0 0,0 7,0" fill="none" stroke="#475569" stroke-width="1.2"/>
    </g>
  <text x="535" y="728" class="comp-title" text-anchor="start">Redis distributed session store</text>
  <text x="535" y="740" class="comp-tech" text-anchor="start">Active logins, calendar locks / 6379</text>

  <!-- Component: AWS S3 Recording Repository -->
  <rect x="900" y="700" width="320" height="60" fill="#FFFFFF" stroke="#475569" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(918, 730)">
      <path d="M -7,-5 A 7,2 0 0,0 7,-5 L 7,5 A 7,2 0 0,1 -7,5 Z" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M -7,-5 A 7,2 0 0,1 7,-5" fill="none" stroke="#475569" stroke-width="1.2"/>
      <path d="M -7,0 A 7,2 0 0,0 7,0" fill="none" stroke="#475569" stroke-width="1.2"/>
    </g>
  <text x="935" y="728" class="comp-title" text-anchor="start">AWS S3 Recording Repository</text>
  <text x="935" y="740" class="comp-tech" text-anchor="start">Archived virtual classroom webinars</text>
  <path d="M 180 180 L 180 270 " fill="none" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
  <text x="180" y="220" class="metadata" text-anchor="middle">HTTPS</text>  <path d="M 410 180 L 410 240 L 650 240 L 650 270 " fill="none" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
  <text x="410" y="205" class="metadata" text-anchor="middle">HTTPS/gRPC</text>  <path d="M 250 320 L 250 390 " fill="none" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
  <text x="250" y="350" class="metadata" text-anchor="middle">HTTP Route</text>  <path d="M 650 320 L 650 360 L 1060 360 L 1060 390 " fill="none" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
  <text x="650" y="335" class="metadata" text-anchor="middle">OIDC Token</text>  <path d="M 260 450 L 260 700 " fill="none" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
  <text x="260" y="570" class="metadata" text-anchor="middle">SQL</text>  <path d="M 660 540 L 660 700 " fill="none" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
  <text x="660" y="615" class="metadata" text-anchor="middle">gRPC/TCP</text>  <path d="M 1060 450 L 1060 700 " fill="none" stroke-width="1.5" marker-end="url(#arrow)" stroke="#0F172A"/>
  <text x="1060" y="570" class="metadata" text-anchor="middle">NFS/REST</text>
  <!-- Standard Legend Block -->
  <g transform="translate(1080, 480)">
    <rect width="260" height="120" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" rx="4"/>
    <text x="15" y="25" class="legend-title">YnY Architecture Registry Legend</text>
    <text x="15" y="45" class="legend-text">Product: Global Tutor</text>
    <text x="15" y="60" class="legend-text">View: Engineering Deployment (L3)</text>
    <text x="15" y="75" class="legend-text">Version: 1.0.0 (Approved)</text>
    <text x="15" y="90" class="legend-text">Standard: STD-017 (Flat Corporate)</text>
    <text x="15" y="105" class="legend-text">Last Updated: 2026-06-29</text>
    
    <!-- Connector examples inside legend -->
    <line x1="170" y1="45" x2="200" y2="45" stroke="#0F172A" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="210" y="48" class="metadata">Sync (REST/gRPC)</text>
    
    <line x1="170" y1="65" x2="200" y2="65" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-dash)"/>
    <text x="210" y="68" class="metadata">Async / Event</text>
    
    <rect x="170" y="82" width="12" height="12" fill="#FFFFFF" stroke="#0D9488" stroke-width="1" rx="2"/>
    <text x="190" y="91" class="metadata">Security Scope</text>
    
    <rect x="170" y="98" width="12" height="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="1" rx="2"/>
    <text x="190" y="107" class="metadata">API Gateway</text>
  </g>
</svg>