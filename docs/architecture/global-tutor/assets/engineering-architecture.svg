<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950" width="100%" height="auto" style="background-color: #FFFFFF; font-family: 'Inter', 'Segoe UI', Arial, sans-serif;">
  <defs>
    <style>
      .title { font-size: 18px; font-weight: bold; fill: #0F172A; }
      .subtitle { font-size: 12px; fill: #475569; }
      .container-title { font-size: 12px; font-weight: bold; fill: #0F172A; }
      .comp-title { font-size: 11px; font-weight: bold; fill: #0F172A; }
      .comp-tech { font-size: 9px; fill: #475569; font-style: italic; }
      .legend-title { font-size: 11px; font-weight: bold; fill: #0F172A; }
      .legend-text { font-size: 9px; fill: #475569; }
      .metadata { font-size: 9px; fill: #64748B; }
    </style>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#0F172A" />
    </marker>
    <!-- Dashed arrow marker -->
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569" />
    </marker>
  </defs>
  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Header -->
  <text x="30" y="45" class="title">Global Tutor - Engineering &amp; Deployment Architecture (L3)</text>
  <text x="30" y="65" class="subtitle">Objective: Physical deployment topology, ports, containers, messaging brokers, and concrete tech stack details.</text>
  <line x1="30" y1="80" x2="1370" y2="80" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Container: Public Client Domain (Web/Mobile) -->
  <rect x="40" y="110" width="1320" height="90" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="5,5" rx="4"/>
  <text x="52" y="128" class="container-title">Public Client Domain (Web/Mobile)</text>

  <!-- Component: Client Browser Front-end -->
  <rect x="80" y="130" width="200" height="50" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(98, 155)">
      <circle cx="0" cy="-4" r="4" fill="none" stroke="#0F172A" stroke-width="1.2"/>
      <path d="M -7,8 A 7,7 0 0,1 7,8" fill="none" stroke="#0F172A" stroke-width="1.2"/>
    </g>
  <text x="115" y="153" class="comp-title" text-anchor="start">Client Browser Front-end</text>
  <text x="115" y="165" class="comp-tech" text-anchor="start">React.js / HTTPS Port 443</text>

  <!-- Component: Executive Mobile Device -->
  <rect x="310" y="130" width="200" height="50" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(328, 155)">
      <circle cx="0" cy="-4" r="4" fill="none" stroke="#0F172A" stroke-width="1.2"/>
      <path d="M -7,8 A 7,7 0 0,1 7,8" fill="none" stroke="#0F172A" stroke-width="1.2"/>
    </g>
  <text x="345" y="153" class="comp-title" text-anchor="start">Executive Mobile Device</text>
  <text x="345" y="165" class="comp-tech" text-anchor="start">iOS Native Swift / TLS</text>

  <!-- Component: External Webhook Caller -->
  <rect x="540" y="130" width="200" height="50" fill="#FFFFFF" stroke="#6D28D9" stroke-width="1.2" rx="4" ry="4" stroke-dasharray="4,4"/>
  <g transform="translate(558, 155)">
      <path d="M -5,4 A 3,3 0 0,1 -3,-2 A 4,4 0 0,1 3,-2 A 3,3 0 0,1 5,4 Z" fill="none" stroke="#6D28D9" stroke-width="1.2"/>
    </g>
  <text x="575" y="153" class="comp-title" text-anchor="start">External Webhook Caller</text>
  <text x="575" y="165" class="comp-tech" text-anchor="start">Third-Party REST / TLS</text>

  <!-- Container: Secure AWS Cloud Infrastructure VPC -->
  <rect x="40" y="220" width="1320" height="600" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,5" rx="4"/>
  <text x="52" y="238" class="container-title">Secure AWS Cloud Infrastructure VPC</text>

  <!-- Container: VPC Public DMZ Subnet (ELB &amp; Ingress Gateway) -->
  <rect x="60" y="250" width="1280" height="90" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5,5" rx="4"/>
  <text x="72" y="268" class="container-title">VPC Public DMZ Subnet (ELB &amp; Ingress Gateway)</text>

  <!-- Component: Traefik Ingress Controller -->
  <rect x="100" y="270" width="300" height="50" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(118, 295)">
      <circle cx="-6" cy="4" r="2" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <circle cx="6" cy="4" r="2" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <circle cx="0" cy="-4" r="2" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <line x1="0" y1="-2" x2="0" y2="4" stroke="#2563EB" stroke-width="1.2"/>
      <line x1="-6" y1="4" x2="6" y2="4" stroke="#2563EB" stroke-width="1.2"/>
    </g>
  <text x="135" y="293" class="comp-title" text-anchor="start">Traefik Ingress Controller</text>
  <text x="135" y="305" class="comp-tech" text-anchor="start">Dynamic routing / Port 80/443</text>

  <!-- Component: AWS Network Load Balancer -->
  <rect x="500" y="270" width="300" height="50" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(518, 295)">
      <circle cx="-6" cy="4" r="2" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <circle cx="6" cy="4" r="2" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <circle cx="0" cy="-4" r="2" fill="none" stroke="#2563EB" stroke-width="1.2"/>
      <line x1="0" y1="-2" x2="0" y2="4" stroke="#2563EB" stroke-width="1.2"/>
      <line x1="-6" y1="4" x2="6" y2="4" stroke="#2563EB" stroke-width="1.2"/>
    </g>
  <text x="535" y="293" class="comp-title" text-anchor="start">AWS Network Load Balancer</text>
  <text x="535" y="305" class="comp-tech" text-anchor="start">Low Latency Route / Port 443</text>

  <!-- Component: Auth0 Single Sign-On Gateway -->
  <rect x="900" y="270" width="300" height="50" fill="#FFFFFF" stroke="#0D9488" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(918, 295)">
      <rect x="-5" y="-1" width="10" height="7" fill="none" stroke="#0D9488" stroke-width="1.2" rx="1"/>
      <path d="M -3,-1 L -3,-4 A 3,3 0 0,1 3,-4 L 3,-1" fill="none" stroke="#0D9488" stroke-width="1.2"/>
    </g>
  <text x="935" y="293" class="comp-title" text-anchor="start">Auth0 Single Sign-On Gateway</text>
  <text x="935" y="305" class="comp-tech" text-anchor="start">OIDC User Auth / JWT Broker</text>

  <!-- Container: VPC Private Application Subnet (EKS Containers) -->
  <rect x="60" y="360" width="1280" height="280" fill="#E2E8F0" stroke="#64748B" stroke-width="1" stroke-dasharray="5,5" rx="4"/>
  <text x="72" y="378" class="container-title">VPC Private Application Subnet (EKS Containers)</text>

  <!-- Component: Go User matching microservice -->
  <rect x="100" y="390" width="320" height="60" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(118, 420)">
      <circle cx="0" cy="-4" r="4" fill="none" stroke="#0F172A" stroke-width="1.2"/>
      <path d="M -7,8 A 7,7 0 0,1 7,8" fill="none" stroke="#0F172A" stroke-width="1.2"/>
    </g>
  <text x="135" y="418" class="comp-title" text-anchor="start">Go User matching microservice</text>
  <text x="135" y="430" class="comp-tech" text-anchor="start">Go 1.22 REST matching backend</text>

  <!-- Component: Go Booking scheduling service -->
  <rect x="500" y="390" width="320" height="60" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(518, 420)">
      <rect x="-8" y="-6" width="16" height="4" fill="none" stroke="#0F172A" stroke-width="1.2" rx="1"/>
      <rect x="-8" y="-1" width="16" height="4" fill="none" stroke="#0F172A" stroke-width="1.2" rx="1"/>
      <rect x="-8" y="4" width="16" height="4" fill="none" stroke="#0F172A" stroke-width="1.2" rx="1"/>
      <circle cx="-5" cy="-4" r="0.5" fill="#0F172A"/>
      <circle cx="-5" cy="1" r="0.5" fill="#0F172A"/>
      <circle cx="-5" cy="6" r="0.5" fill="#0F172A"/>
    </g>
  <text x="535" y="418" class="comp-title" text-anchor="start">Go Booking scheduling service</text>
  <text x="535" y="430" class="comp-tech" text-anchor="start">Go 1.22 calendar scheduling micro</text>

  <!-- Component: Node.js Webinar Classroom sync -->
  <rect x="900" y="390" width="320" height="60" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(918, 420)">
      <circle cx="-6" cy="4" r="2" fill="none" stroke="#0F172A" stroke-width="1.2"/>
      <circle cx="6" cy="4" r="2" fill="none" stroke="#0F172A" stroke-width="1.2"/>
      <circle cx="0" cy="-4" r="2" fill="none" stroke="#0F172A" stroke-width="1.2"/>
      <line x1="0" y1="-2" x2="0" y2="4" stroke="#0F172A" stroke-width="1.2"/>
      <line x1="-6" y1="4" x2="6" y2="4" stroke="#0F172A" stroke-width="1.2"/>
    </g>
  <text x="935" y="418" class="comp-title" text-anchor="start">Node.js Webinar Classroom sync</text>
  <text x="935" y="430" class="comp-tech" text-anchor="start">Janus WebRTC signaling gateway</text>

  <!-- Component: Go Assessment / Quiz engine -->
  <rect x="100" y="480" width="320" height="60" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.2" rx="4" ry="4" />
  <g transform="translate(118, 510)">
      <path d="M -5,-7 L 2,-7 L 5,-4 L 5,7 L -5,7 Z" fill="none" stroke="#0F172A" stroke-width="1.2"/>
      <path d="M 2,-7 L 2,-4 L 5,-4" fill="none" stroke="#0F172A" stroke-width="1.2"/>
    </g>
  <text x="135" y="508" class="comp-title" text-anchor="start">Go Assessment / Quiz engine</text>
  <text x="135" y="520" class="comp-tech" text-anchor="start">Go 1.22 testing microservice</text>

